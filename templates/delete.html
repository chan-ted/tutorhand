{% extends 'base.html' %}

{% block title %} Home {% endblock %}

    {% block content %}

    {% for p in practices %}
    <h3>ID:  {{p.id}}</h3>
    <img src="{{ url_for('uploaded_file', filename = p.questionLink)}}">
    <img src="{{ url_for('uploaded_file', filename = p.answerLink)}}">
    
    <a href="{{ url_for('delete_practice', id=p.id) }}" 
           onclick="return confirm('Are you sure you want to delete this?');">
           <button type="button" style="background-color: red; color: white;">Delete</button>
    </a>
    
    {% endfor %}

    {% endblock %}
